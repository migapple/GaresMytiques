<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gares Mythiques du Monde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="capacitor.js"></script>
<style>
:root {
  --ink:   #080b10;
  --steel: #0e1520;
  --rail:  #1a2535;
  --gold:  #c8a84b;
  --gold2: #e6c96b;
  --steam: #8faab8;
  --fog:   #5a7080;
  --white: #eef4f8;
  --accent:#3a7bd5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#080b10;font-family:'Lora',Georgia,serif;color:#eef4f8}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#080b10;overflow:hidden}

/* HEADER */
.header{padding-top:calc(14px + env(safe-area-inset-top));background:var(--steel);flex-shrink:0;border-bottom:1px solid rgba(200,168,75,0.2)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:0 16px 10px}
.app-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;letter-spacing:0.04em;color:var(--gold);line-height:1.1}
.app-subtitle{font-size:11px;font-weight:400;font-style:italic;color:var(--fog);margin-top:1px}
.header-actions{display:flex;gap:10px;align-items:center}
.btn-icon{background:none;border:none;color:var(--steam);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.btn-lang{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1}

/* FILTER TABS */
.filter-bar{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;background:rgba(255,255,255,0.06);border:1px solid rgba(200,168,75,0.15);border-radius:16px;padding:5px 13px;font-size:12px;font-family:'Lora',serif;color:var(--steam);cursor:pointer;transition:all .2s;white-space:nowrap}
.ftab.active{background:rgba(200,168,75,0.18);border-color:var(--gold);color:var(--gold)}

/* NAV TABS */
.nav{display:flex;background:var(--steel);border-top:1px solid rgba(200,168,75,0.15);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border:none;background:none;color:var(--fog);cursor:pointer;transition:color .2s;font-size:9px;font-family:'Lora',serif;letter-spacing:0.06em;text-transform:uppercase}
.ntab.active{color:var(--gold)}
.ntab .nico{font-size:22px}

/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}

/* ── LIST ── */
.list-view{padding:12px}
.station-card{display:flex;align-items:center;gap:12px;background:var(--rail);border:1px solid rgba(200,168,75,0.12);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.station-card:active{transform:scale(.98)}
.station-card:hover{border-color:rgba(200,168,75,0.3)}
.card-img-wrap{width:88px;height:88px;flex-shrink:0;background:var(--steel);overflow:hidden;position:relative}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s;opacity:0;z-index:1}
.card-img.loaded{opacity:1}
.card-img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:rgba(200,168,75,0.3);z-index:0}
.card-body{flex:1;padding:10px 12px 10px 0;min-width:0}
.card-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-city{font-size:12px;color:var(--gold);margin-top:2px;font-style:italic}
.card-era{font-size:11px;color:var(--fog);margin-top:3px}
.card-badge{position:absolute;top:8px;right:8px;background:rgba(200,168,75,0.2);border:1px solid rgba(200,168,75,0.4);border-radius:8px;padding:2px 7px;font-size:10px;color:var(--gold);font-family:'Playfair Display',serif}

/* ── DETAIL ── */
#vdetail{position:absolute;inset:0;background:var(--ink);z-index:100;display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
#vdetail.open{transform:translateX(0)}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.detail-hero-wrap{position:relative;overflow:hidden;height:240px;background:var(--steel);flex-shrink:0}
.detail-hero-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:60px;color:rgba(200,168,75,0.2);z-index:0}
.detail-hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s;z-index:1}
.detail-hero.loaded{opacity:1}
.detail-topbar{padding-top:calc(10px + env(safe-area-inset-top));padding-bottom:10px;padding-left:14px;padding-right:14px;background:var(--steel);flex-shrink:0;border-bottom:1px solid rgba(200,168,75,0.15)}
.detail-back{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;font-family:'Lora',serif;padding:0;display:flex;align-items:center;gap:6px}
.detail-body{padding:20px 18px 40px}
.detail-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--white);line-height:1.15}
.detail-city{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--gold);margin-top:4px}
.detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.meta-pill{background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.25);border-radius:10px;padding:4px 10px;font-size:11px;color:var(--steam)}
.detail-desc{font-size:15px;line-height:1.7;color:var(--steam);margin-top:16px}
.detail-section{margin-top:20px}
.detail-section h3{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid rgba(200,168,75,0.15);padding-bottom:6px}
.detail-facts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fact-box{background:var(--rail);border:1px solid rgba(200,168,75,0.1);border-radius:10px;padding:10px 12px}
.fact-label{font-size:10px;color:var(--fog);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.fact-value{font-family:'Playfair Display',serif;font-size:14px;color:var(--white)}
.detail-link{display:block;margin-top:20px;text-align:center;background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.3);border-radius:12px;padding:12px;color:var(--gold);font-size:13px;font-family:'Playfair Display',serif;cursor:pointer;text-decoration:none}

/* ── MAP ── */
#vmap{flex:1;min-height:0;display:none}
#map{width:100%;height:100%}
.leaflet-popup-content-wrapper{background:var(--rail);border:1px solid rgba(200,168,75,0.3);border-radius:10px;color:var(--white);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.leaflet-popup-content{margin:10px 14px;font-family:'Lora',serif}
.popup-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gold)}
.popup-city{font-size:12px;color:var(--steam);margin-top:2px}
.leaflet-popup-tip{background:var(--rail)}

/* ── QUIZ ── */
#vquiz{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px}
.quiz-start{text-align:center;padding:30px 20px}
.quiz-start h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--gold);margin-bottom:10px}
.quiz-start p{font-size:14px;color:var(--steam);line-height:1.6;margin-bottom:24px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;border-radius:12px;padding:14px 32px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.quiz-q{background:var(--rail);border:1px solid rgba(200,168,75,0.2);border-radius:14px;padding:18px;margin-bottom:14px}
.quiz-qnum{font-size:11px;color:var(--fog);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.quiz-qimg{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:12px;opacity:0;transition:opacity .4s;background:var(--steel)}
.quiz-qimg.loaded{opacity:1}
.quiz-qtext{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--white);margin-bottom:14px;line-height:1.4}
.quiz-opts{display:grid;gap:8px}
.quiz-opt{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Lora',serif;color:var(--white);cursor:pointer;text-align:left;transition:all .2s}
.quiz-opt.correct{background:rgba(50,180,100,0.2);border-color:#32b464;color:#6fdc9a}
.quiz-opt.wrong{background:rgba(200,50,50,0.2);border-color:#c83232;color:#f08080}
.quiz-opt:disabled{cursor:default}
.quiz-score{text-align:center;padding:24px 16px}
.score-num{font-family:'Playfair Display',serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1}
.score-label{font-size:14px;color:var(--steam);margin-top:6px}
.score-msg{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);margin-top:16px;font-style:italic}

/* SETTINGS */
#vsettings{position:absolute;bottom:0;left:0;right:0;background:var(--steel);border-top:1px solid rgba(200,168,75,0.25);border-radius:18px 18px 0 0;z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;max-height:85vh}
#vsettings.open{transform:translateY(0)}
.settings-header{padding:14px 18px 10px;border-bottom:1px solid rgba(200,168,75,0.15);flex-shrink:0}
.settings-header h2{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold)}
.settings-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 18px 30px;flex:1}
.settings-close{float:right;background:none;border:none;font-size:22px;color:var(--fog);cursor:pointer;margin-top:-2px}
.app-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.app-row:last-child{border-bottom:none}
.app-icon{width:48px;height:48px;border-radius:10px;background:var(--rail);object-fit:cover;flex-shrink:0}
.app-info{flex:1;min-width:0}
.app-info-name{font-size:13px;font-family:'Playfair Display',serif;color:var(--white)}
.app-badge{display:block;margin-top:6px;height:20px}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:250;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title" id="hTitle">Gares Mythiques</div>
        <div class="app-subtitle" id="hSub">Les plus belles gares du monde</div>
      </div>
      <div class="header-actions">
        <button class="btn-lang" id="btnLang" onclick="toggleLang()">🇬🇧</button>
        <button class="btn-icon" onclick="openSettings()">⚙️</button>
      </div>
    </div>
    <div class="filter-bar" id="filterBar"></div>
  </div>

  <div class="main" id="mainScroll">
    <div id="vlist" class="list-view"></div>
  </div>
  <div id="vmap"><div id="map"></div></div>
  <div id="vquiz"></div>

  <nav class="nav">
    <button class="ntab active" id="nt0" onclick="switchTab(0)"><span class="nico">🚂</span><span id="nl0">Liste</span></button>
    <button class="ntab" id="nt1" onclick="switchTab(1)"><span class="nico">🗺️</span><span id="nl1">Carte</span></button>
    <button class="ntab" id="nt2" onclick="switchTab(2)"><span class="nico">❓</span><span id="nl2">Quiz</span></button>
  </nav>

  <!-- Detail panel -->
  <div id="vdetail">
    <div class="detail-topbar">
      <button class="detail-back" onclick="closeDetail()">← <span id="dBackTxt">Retour</span></button>
    </div>
    <div class="detail-scroll">
      <div class="detail-hero-wrap">
        <div class="detail-hero-ph" id="detPh">🚂</div>
        <img class="detail-hero" id="detHero" src="" alt="">
      </div>
      <div class="detail-body" id="detBody"></div>
    </div>
  </div>

  <!-- Overlay + Settings -->
  <div class="overlay" id="overlay" onclick="closeSettings()"></div>
  <div id="vsettings">
    <div class="settings-header">
      <button class="settings-close" onclick="closeSettings()">✕</button>
      <h2 id="settTitle">Mes Applications</h2>
    </div>
    <div class="settings-scroll" id="settList"></div>
  </div>
</div>

<script>
// ── LANGUAGE ──────────────────────────────────────────────
var lang = 'fr';
function toggleLang(){
  lang = lang==='fr'?'en':'fr';
  document.getElementById('btnLang').textContent = lang==='fr'?'🇬🇧':'🇫🇷';
  applyLang(); renderList(); if(currentDetail) openDetail(currentDetail.id);
}
function T(fr,en){return lang==='fr'?fr:en}
function applyLang(){
  document.getElementById('hTitle').textContent = T('Gares Mythiques','Legendary Stations');
  document.getElementById('hSub').textContent  = T('Les plus belles gares du monde','The world\'s most beautiful stations');
  document.getElementById('nl0').textContent = T('Liste','List');
  document.getElementById('nl1').textContent = T('Carte','Map');
  document.getElementById('nl2').textContent = T('Quiz','Quiz');
  document.getElementById('dBackTxt').textContent = T('Retour','Back');
  document.getElementById('settTitle').textContent = T('Mes Applications','My Apps');
  buildFilters();
}

// ── TABS ──────────────────────────────────────────────────
var curTab = 0;
function switchTab(t){
  curTab = t;
  ['mainScroll','vmap','vquiz'].forEach((id,i)=>{
    var el = document.getElementById(id);
    el.style.display = i===t ? (t===0?'block':'flex') : 'none';
    if(i===0) el.style.flex = t===0?'1':'';
  });
  document.getElementById('vmap').style.display = t===1?'flex':'none';
  document.getElementById('vquiz').style.display = t===2?'flex':'none';
  document.getElementById('mainScroll').style.display = t===0?'block':'none';
  ['nt0','nt1','nt2'].forEach((id,i)=>document.getElementById(id).classList.toggle('active',i===t));
  if(t===1 && !mapInit) initMap();
  if(t===2) renderQuiz();
}

// ── IMAGE CACHE ───────────────────────────────────────────
var imgCache = {};
var CACHE_PFX = 'gmv11_';
try{
  // Purger les anciens caches
  Object.keys(localStorage).forEach(function(k){
    if(k.startsWith('gmv') && !k.startsWith(CACHE_PFX)) localStorage.removeItem(k);
  });
  // Charger le cache courant
  Object.keys(localStorage).forEach(function(k){
    if(k.startsWith(CACHE_PFX)) imgCache[k.slice(CACHE_PFX.length)] = localStorage.getItem(k);
  });
}catch(e){}

function saveCache(id, data){
  imgCache[id]=data;
  try{localStorage.setItem(CACHE_PFX+id,data);}catch(e){}
}

// ── LOAD IMAGE (méthode wt: Wikipedia pageimages ou URL directe) ────────
function loadImg(s, elemId){
  if(!s.wt) return;
  var el = document.getElementById(elemId);
  if(!el) return;
  if(imgCache[s.id]){ applyImg(el, imgCache[s.id]); return; }

  var http = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorHttp;
  if(!http) return;

  // URL directe Wikimedia
  if(s.wt.startsWith('https://')){
    http.get({url:s.wt, responseType:'arraybuffer'}).then(function(r){
      var b64 = 'data:image/jpeg;base64,'+r.data;
      saveCache(s.id, b64);
      applyImg(el, b64);
    }).catch(function(){});
    return;
  }

  // Essai en.wikipedia d'abord, puis fr.wikipedia en fallback
  var wlang = s.wtlang || 'en';
  var url = 'https://'+wlang+'.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(s.wt)
           +'&prop=pageimages&pithumbsize=600&format=json&origin=*';

  function fetchThumb(apiUrl, fallback){
    http.get({url:apiUrl}).then(function(r){
      var data = typeof r.data==='string'?JSON.parse(r.data):r.data;
      var pages = data.query && data.query.pages;
      if(!pages) { if(fallback) fallback(); return; }
      var page = Object.values(pages)[0];
      var src = page && page.thumbnail && page.thumbnail.source;
      if(!src) { if(fallback) fallback(); return; }
      // Télécharger en arraybuffer via CapacitorHttp pour contourner les restrictions CORS
      http.get({url:src, responseType:'arraybuffer'}).then(function(r2){
        var b64 = 'data:image/jpeg;base64,'+r2.data;
        saveCache(s.id, b64);
        applyImg(el, b64);
      }).catch(function(){
        // Fallback : afficher l'URL directement
        saveCache(s.id, src);
        applyImg(el, src);
      });
    }).catch(function(){ if(fallback) fallback(); });
  }

  var fbUrl = 'https://fr.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(s.wt)
             +'&prop=pageimages&pithumbsize=600&format=json&origin=*';
  if(wlang==='en'){
    fetchThumb(url, function(){ fetchThumb(fbUrl, null); });
  } else {
    fetchThumb(url, null);
  }
}

function applyImg(el, src){
  if(!el) return;
  el.src = src;
  el.onload = function(){ el.classList.add('loaded'); };
}

// ── FILTER ───────────────────────────────────────────────
var REGIONS = ['all','europe','amerique','asie','afrique','oceanie'];
var REGIONS_EN = ['All','Europe','Americas','Asia','Africa','Oceania'];
var REGIONS_FR = ['Tout','Europe','Amérique','Asie','Afrique','Océanie'];
var curRegion = 'all';

function buildFilters(){
  var bar = document.getElementById('filterBar');
  bar.innerHTML = REGIONS.map(function(r,i){
    return '<button class="ftab'+(r===curRegion?' active':'') +'" onclick="setRegion(\''+r+'\')">'+(lang==='fr'?REGIONS_FR[i]:REGIONS_EN[i])+'</button>';
  }).join('');
}
function setRegion(r){
  curRegion = r;
  buildFilters();
  renderList();
}

// ── DATA ─────────────────────────────────────────────────
var STATIONS = [
  // EUROPE
  {id:'gdn',region:'europe',
   name:'Gare du Nord',nameEn:'Gare du Nord',
   city:'Paris',cityEn:'Paris, France',
   country:'France',
   year:1864, style:'Néo-classique',styleEn:'Neo-classical',

   passengers:'214M/an', tracks:36,

  {id:'gly',region:'europe',
   name:'Gare de Lyon',nameEn:'Gare de Lyon',
   city:'Paris',cityEn:'Paris, France',
   country:'France',
   year:1900, style:'Éclectique',styleEn:'Eclectic',
   arch:'Marius Toudoire',
   desc:'Symbole de la Belle Époque, célèbre pour sa tour de l\'horloge et le restaurant Le Train Bleu. Inaugurée pour l\'Exposition universelle de 1900.',
   descEn:'Symbol of the Belle Époque, famous for its clock tower and the Le Train Bleu restaurant. Inaugurated for the 1900 Universal Exhibition.',
   country_flag:'🇫🇷',
   wt:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Gare_de_Lyon%2C_Paris_12e_%282%29.jpg/960px-Gare_de_Lyon%2C_Paris_12e_%282%29.jpg',
   passengers:'90M/an', tracks:24,
   wiki:'https://fr.wikipedia.org/wiki/Gare_de_Lyon'},

  {id:'gsp',region:'europe',
   name:'Gare Saint-Pancras',nameEn:'St Pancras International',
   city:'Londres',cityEn:'London, UK',
   country:'Royaume-Uni',
   year:1868, style:'Gothique victorien',styleEn:'Victorian Gothic',
   arch:'George Gilbert Scott',
   desc:'Joyau de l\'architecture victorienne, restaurée en 2007. Point de départ de l\'Eurostar, elle abrite une statue emblématique d\'un couple s\'embrassant.',
   descEn:'Jewel of Victorian architecture, restored in 2007. The Eurostar departure point houses an iconic sculpture of a kissing couple.',
   country_flag:'🇬🇧',
   wt:'St Pancras railway station',
   passengers:'32M/an', tracks:15,
   wiki:'https://fr.wikipedia.org/wiki/Gare_de_Saint-Pancras'},

  {id:'gcb',region:'europe',
   name:'Gare Centrale de Berlin',nameEn:'Berlin Hauptbahnhof',
   city:'Berlin',cityEn:'Berlin, Germany',
   country:'Allemagne',

// ── RENDER LIST ───────────────────────────────────────────
function filtered(){
  if(curRegion==='all') return STATIONS;
  return STATIONS.filter(function(s){return s.region===curRegion});
}

function renderList(){
  var list = document.getElementById('vlist');
  var data = filtered();
  list.innerHTML = data.map(function(s){
    return '<div class="station-card" onclick="openDetail(\''+s.id+'\')">'
      +'<div class="card-img-wrap">'
      +'<div class="card-img-placeholder">'+s.country_flag+'</div>'
      +'<img class="card-img" id="ci-'+s.id+'" src="" alt="">'
      +'</div>'
      +'<div class="card-body">'
      +'<div class="card-name">'+(lang==='fr'?s.name:s.nameEn)+'</div>'
      +'<div class="card-city">'+s.country_flag+' '+(lang==='fr'?s.city:s.cityEn)+'</div>'
      +'<div class="card-era">'+s.year+' · '+(lang==='fr'?s.style:s.styleEn)+'</div>'
      +'</div>'
      +'<div class="card-badge">'+s.country_flag+'</div>'
      +'</div>';
  }).join('');

var mapInit = false, leafMap;
function initMap(){
  if(mapInit) return; mapInit=true;
  leafMap = L.map('map',{zoomControl:true}).setView([20,0],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:18}).addTo(leafMap);
  STATIONS.forEach(function(s){
    var c = COORDS[s.id]; if(!c) return;
    var mk = L.marker(c,{
      icon: L.divIcon({className:'',html:'<div style="font-size:26px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8))">🚂</div>',iconSize:[32,32],iconAnchor:[16,16]})
    }).addTo(leafMap);
    mk.bindPopup('<div class="popup-name">'+(lang==='fr'?s.name:s.nameEn)+'</div>'
      +'<div class="popup-city">'+s.country_flag+' '+(lang==='fr'?s.city:s.cityEn)+'</div>');
    mk.on('click',function(){ setTimeout(function(){openDetail(s.id)},300); });
  });
  setTimeout(function(){leafMap.invalidateSize();},300);
}

// ── QUIZ ─────────────────────────────────────────────────
var quizState = null;
function renderQuiz(){
  var el = document.getElementById('vquiz');
  if(!quizState){
    el.innerHTML = '<div class="quiz-start">'
      +'<h2>'+T('Quiz Gares','Station Quiz')+'</h2>'
      +'<p>'+T('Testez vos connaissances sur les plus belles gares du monde en 10 questions.','Test your knowledge of the world\'s most beautiful stations in 10 questions.')+'</p>'
      +'<button class="btn-primary" onclick="startQuiz()">'+T('Commencer','Start')+'</button>'
      +'</div>';
  } else if(quizState.done){
    var pct = Math.round(quizState.score/quizState.total*100);
    var msg = pct>=80?T('Excellent ! Vous êtes un expert des gares du monde !','Excellent! You\'re a world station expert!')
              :pct>=50?T('Bien joué ! Continuez à explorer le monde ferroviaire.','Well done! Keep exploring the railway world.')
              :T('Retournez visiter quelques gares… virtuellement !','Go visit a few more stations… virtually!');
    el.innerHTML = '<div class="quiz-score">'
      +'<div class="score-num">'+quizState.score+'/'+quizState.total+'</div>'
      +'<div class="score-label">'+pct+'%</div>'
      +'<div class="score-msg">'+msg+'</div>'
      +'<br><button class="btn-primary" onclick="quizState=null;renderQuiz()">'+T('Rejouer','Play Again')+'</button>'
      +'</div>';
  } else {
    renderQuizQuestion();
  }
}

function startQuiz(){
  var pool = STATIONS.slice().sort(function(){return Math.random()-.5}).slice(0,10);
  var types = ['city','style','year','arch'];
  quizState = {
    questions: pool.map(function(s){
      var type = types[Math.floor(Math.random()*types.length)];
      return buildQuestion(s,type);
    }),
    current:0, score:0, total:10, answered:false, done:false
  };
  renderQuizQuestion();
}

function buildQuestion(s, type){
  var others = STATIONS.filter(function(x){return x.id!==s.id}).sort(function(){return Math.random()-.5}).slice(0,3);
  var q={station:s,type:type,opts:[],answer:''};
  if(type==='city'){
    q.text = {fr:'Dans quelle ville se trouve '+s.name+' ?', en:'In which city is '+s.nameEn+' located?'};
    q.answer = lang==='fr'?s.city:s.cityEn;
    q.opts = [q.answer].concat(others.map(function(x){return lang==='fr'?x.city:x.cityEn})).sort(function(){return Math.random()-.5});
  } else if(type==='style'){
    q.text = {fr:'Quel est le style architectural de '+s.name+' ?', en:'What architectural style is '+s.nameEn+'?'};
    q.answer = lang==='fr'?s.style:s.styleEn;
    q.opts = [q.answer].concat(others.map(function(x){return lang==='fr'?x.style:x.styleEn})).sort(function(){return Math.random()-.5});
  } else if(type==='year'){
    q.text = {fr:'En quelle année a été inaugurée '+s.name+' ?', en:'In which year was '+s.nameEn+' inaugurated?'};
    q.answer = ''+s.year;
    q.opts = [''+s.year].concat(others.map(function(x){return ''+x.year})).sort(function(){return Math.random()-.5});
  } else {
    q.text = {fr:'Quel architecte a conçu '+s.name+' ?', en:'Which architect designed '+s.nameEn+'?'};
    q.answer = s.arch;
    q.opts = [s.arch].concat(others.map(function(x){return x.arch})).sort(function(){return Math.random()-.5});
  }
  return q;
}

function renderQuizQuestion(){
  var el = document.getElementById('vquiz');
  var q = quizState.questions[quizState.current];
  var s = q.station;
  var qnum = (quizState.current+1)+'/'+quizState.total;
  el.innerHTML = '<div class="quiz-q">'
    +'<div class="quiz-qnum">'+T('Question','Question')+' '+qnum+'</div>'
    +'<img class="quiz-qimg" id="qimg-'+s.id+'" src="" alt="">'
    +'<div class="quiz-qtext">'+(lang==='fr'?q.text.fr:q.text.en)+'</div>'
    +'<div class="quiz-opts">'+q.opts.map(function(o){
      return '<button class="quiz-opt" onclick="answerQuiz(this,\''+o.replace(/'/g,"&#39;")+'\',\''+q.answer.replace(/'/g,"&#39;")+'\')">'+ o+'</button>';
    }).join('')+'</div></div>';
  loadImg(s, 'qimg-'+s.id);
}

function answerQuiz(btn, chosen, answer){
  if(quizState.answered) return;
  quizState.answered = true;
  var opts = btn.parentNode.querySelectorAll('.quiz-opt');
  opts.forEach(function(b){
    b.disabled=true;
    if(b.textContent.trim()===answer) b.classList.add('correct');
    else if(b===btn && chosen!==answer) b.classList.add('wrong');
  });
  if(chosen===answer) quizState.score++;
  setTimeout(function(){
    quizState.current++;
    quizState.answered=false;
    if(quizState.current>=quizState.total) quizState.done=true;
    renderQuiz();
  },1100);
}
